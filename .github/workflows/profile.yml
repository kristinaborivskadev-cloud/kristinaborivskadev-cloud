name: Profile README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:

  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: kristinaborivskadev-cloud
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=#865AF5&color_dots=#0d1117,#1a1333,#2b1f52,#4a34a3,#865AF5&color_background=#0d1117
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
