name: Profile README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:

  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: kristinaborivskadev-cloud
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=#09A787&color_dots=#73F2D9,#52EFAB,#B8F8DC,#4FF18A,#BDFF6C&color_background=#aaaaaa
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
